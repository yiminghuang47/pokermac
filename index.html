<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pokermac</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <div class="topbar">
    <span>Score: <b id="score">0</b></span>
    <span>Time: <b id="timer">120</b></span>
  </div>

  <div class="rows">
    <div class="seat">
      <div class="who">Villain</div>
      <div class="row" id="villainCards"></div>
    </div>
    <div class="seat">
      <div class="who">Board</div>
      <div class="row" id="boardCards"></div>
    </div>
    <div class="seat">
      <div class="who">You</div>
      <div class="row" id="heroCards"></div>
    </div>
  </div>

  <div class="prompt">Winning Outs?</div>
  <div class="answer">
    <input id="outs" type="number" inputmode="numeric" min="0" max="47" autocomplete="off" />
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="overlay" id="startOverlay">
  <h2>pokermac</h2>
  <p>Count the number of winning outs (chop outs don't count)</p>
  <div class="row-opts">
    <label>Time:
      <select id="timeSel">
        <option value="60">60s</option>
        <option value="120" selected>120s</option>
        <option value="180">180s</option>
      </select>
    </label>
  </div>
  <button id="startBtn">Start</button>
</div>

<div class="overlay hidden" id="endOverlay">
  <h2 id="endTitle">Time!</h2>
  <p id="endStats"></p>
  <button id="againBtn">Play again</button>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
